<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Classic Ludo board game! Play with 2-4 players. Roll dice and race your tokens home!">
    <meta name="keywords" content="ludo, board game, dice game, family game, classic ludo">
    <title>Classic Ludo - Board Game | PlayCrazyGames</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9770610643444805" crossorigin="anonymous"></script>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-container">
        <a href="../index.html" class="back-home">← Back to All Games</a>
        <h1>🎲 Classic Ludo</h1>
        <div class="game-info">
            <div class="players-status">
                <div class="player red">🔴 Red: <span id="redScore">0</span>/4</div>
                <div class="player green">🟢 Green: <span id="greenScore">0</span>/4</div>
                <div class="player yellow">🟡 Yellow: <span id="yellowScore">0</span>/4</div>
                <div class="player blue">🔵 Blue: <span id="blueScore">0</span>/4</div>
            </div>
            <div class="turn-indicator" id="turnIndicator">🎲 Red's Turn</div>
            <div class="dice-area">
                <div class="dice" id="dice">🎲</div>
                <button id="rollBtn">Roll Dice</button>
            </div>
        </div>
        <canvas id="ludoCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <button id="resetBtn">🔄 New Game</button>
            <button id="backBtn">🏠 Games Hub</button>
        </div>
        <div class="message" id="message"></div>
        <div class="instructions">
            🎲 Roll a 6 to bring a token out<br>
            🏆 Get all 4 tokens home to win<br>
            💥 Capture opponent tokens by landing on them<br>
            ⭐ Extra turn when you roll a 6!
        </div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
