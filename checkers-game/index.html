<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Classic Checkers board game! Jump opponent pieces, become king, win the game!">
    <meta name="keywords" content="checkers, board game, strategy game, draughts, classic game">
    <title>Checkers - Classic Board Game | PlayCrazyGames</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9770610643444805" crossorigin="anonymous"></script>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-container">
        <a href="../index.html" class="back-home">← Back to All Games</a>
        <h1>⬛ Checkers Game</h1>
        <div class="game-info">
            <div class="turn-indicator" id="turnIndicator">🔴 Red's Turn</div>
            <div class="scores">
                <div>Red Pieces: <span id="redPieces">12</span></div>
                <div>Black Pieces: <span id="blackPieces">12</span></div>
            </div>
        </div>
        <canvas id="checkersCanvas" width="560" height="560"></canvas>
        <div class="controls">
            <button id="resetBtn">🔄 New Game</button>
            <button id="backBtn">🏠 Games Hub</button>
        </div>
        <div class="message" id="message"></div>
        <div class="instructions">
            👑 Click a piece, then click a valid square to move<br>
            ⭐ Jump over opponent pieces to capture them<br>
            👑 Reach the opposite end to become KING!<br>
            🏆 Capture all opponent pieces to win!
        </div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
