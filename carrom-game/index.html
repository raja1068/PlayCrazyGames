<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Classic Carrom Board Game - Play with Bot or Friend! Aim, shoot, pocket coins!">
    <meta name="keywords" content="carrom, board game, striker, carrom game, offline game, bot game">
    <title>Carrom Board Game - Play with Bot | PlayCrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-top, .ad-bottom {
            width: 100%;
            max-width: 950px;
            background: rgba(255,255,255,0.95);
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            border-radius: 12px;
        }

        .ad-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
        }

        .game-wrapper {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            background: white;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: #2e7d32;
            color: white;
            transform: translateX(-5px);
        }

        .game-container {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ffcc80;
            font-size: 0.85rem;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            background: #ff9800;
            color: #1a237e;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .scores {
            display: flex;
            gap: 25px;
        }

        .score-card {
            text-align: center;
            padding: 5px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .score-label {
            font-size: 0.7rem;
            color: #ffcc80;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-container {
            position: relative;
        }

        #carromCanvas {
            background: #DEB887;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: crosshair;
            display: block;
            width: 100%;
            height: auto;
        }

        .controls-panel {
            width: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }

        .power-control {
            margin-bottom: 20px;
        }

        .power-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #powerSlider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        #powerSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff9800;
            border-radius: 50%;
            cursor: pointer;
        }

        #powerValue {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
            margin-top: 10px;
        }

        .striker-control {
            margin-bottom: 20px;
            text-align: center;
        }

        .striker-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .striker-position {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .striker-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .striker-btn:hover {
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .shoot-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shoot-btn:hover {
            transform: scale(1.05);
        }

        .reset-btn, .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover, .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #ffcc80;
            min-height: 40px;
            font-size: 0.9rem;
        }

        .instructions {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.7rem;
            color: #ffcc80;
            text-align: center;
        }

        @media (max-width: 900px) {
            .controls-panel { width: 200px; padding: 15px; }
            .striker-btn { width: 35px; height: 35px; font-size: 1rem; }
        }

        @media (max-width: 800px) {
            .game-area { flex-direction: column; align-items: center; }
            .controls-panel { width: 100%; max-width: 400px; }
            .action-buttons { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .shoot-btn, .reset-btn, .back-btn { padding: 8px 20px; }
        }
        
        @media (max-width: 650px) {
            #carromCanvas { width: 100%; height: auto; }
            .game-container { padding: 15px; }
            .game-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <a href="../index.html" class="back-home" id="backToHub">← Back to Games Hub</a>
        
        <div class="game-container">
            <div class="game-header">
                <h1>🎯 Carrom Board</h1>
                <p class="subtitle">Classic Indian Board Game | Play with Bot or Friend!</p>
            </div>
            
            <div class="mode-selector">
                <button id="botModeBtn" class="mode-btn active">🤖 Play with Bot</button>
                <button id="twoPlayerModeBtn" class="mode-btn">👥 Two Player</button>
            </div>
            
            <div class="game-info">
                <div class="turn-indicator" id="turnIndicator">
                    🎯 Player 1's Turn
                </div>
                <div class="scores">
                    <div class="score-card">
                        <div class="score-label">Player 1</div>
                        <div class="score-value" id="player1Score">0</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label" id="player2Label">Player 2</div>
                        <div class="score-value" id="player2Score">0</div>
                    </div>
                </div>
            </div>
            
            <div class="game-area">
                <div class="board-container">
                    <canvas id="carromCanvas" width="600" height="600"></canvas>
                </div>
                
                <div class="controls-panel">

                        <label>💪 POWER: <span id="powerValue">0</span>%</label>
                        <input type="range" id="powerSlider" min="0" max="100" value="0">

                    <div class="striker-control">

                        </div>

                    <div class="action-buttons">
                        <button id="shootBtn" class="shoot-btn">🔫 SHOOT!</button>
                        <button id="resetBtn" class="reset-btn">🔄 New Game</button>

                    </div>

            </div>
            
            <div class="status" id="status"></div>

                🎯 Move mouse to aim | 💪 Adjust power slider | 🎮 Move striker with buttons | Click SHOOT to play!

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <script>
        // ========================================
        // COMPLETE CARROM BOARD GAME
        // Bot Opponent | Power Slider | Movable Striker
        // ========================================

        const canvas = document.getElementById('carromCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 600;

        // Game Mode
        let gameMode = 'bot';
        let isBotThinking = false;

        // Game State
        let currentPlayer = 1;
        let player1Score = 0;
        let player2Score = 0;
        let gameActive = true;

        // Physics
        let friction = 0.98;
        let pocketRadius = 22;
        let striker = {
            x: 300,
            y: 540,
            radius: 12,
            vx: 0,
            vy: 0,
            moving: false
        };

        let coins = [];
        let power = 0;
        let aimAngle = -Math.PI / 2;
        let mouseX = 300, mouseY = 540;

        // Pocket positions
        const pockets = [
            {x: 30, y: 30}, {x: 300, y: 30}, {x: 570, y: 30},
            {x: 30, y: 570}, {x: 300, y: 570}, {x: 570, y: 570}
        ];

        // Initialize coins
        function initCoins() {
            coins = [];
            const centerX = 300;
            const centerY = 300;
            
            // Red Queen in center
            coins.push({
                x: centerX, y: centerY, radius: 11,
                color: '#ff4444', points: 50, isQueen: true,
                vx: 0, vy: 0, pocketed: false
            });
            
            // Inner ring (6 coins)
            const innerPositions = [
                {x: centerX, y: centerY - 30, color: '#44ff44', points: 10},
                {x: centerX + 26, y: centerY - 15, color: '#4444ff', points: 10},
                {x: centerX + 26, y: centerY + 15, color: '#ffff44', points: 10},
                {x: centerX, y: centerY + 30, color: '#ff8844', points: 10},
                {x: centerX - 26, y: centerY + 15, color: '#ff44ff', points: 10},
                {x: centerX - 26, y: centerY - 15, color: '#44ffff', points: 10}
            ];
            
            innerPositions.forEach(pos => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 10,
                    color: pos.color, points: pos.points, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
            
            // Outer ring (8 coins)
            const outerPositions = [
                {x: centerX - 55, y: centerY - 35, color: '#88ff88', points: 10},
                {x: centerX, y: centerY - 60, color: '#ff8888', points: 10},
                {x: centerX + 55, y: centerY - 35, color: '#88ff88', points: 10},
                {x: centerX + 60, y: centerY, color: '#ff8888', points: 10},
                {x: centerX + 55, y: centerY + 35, color: '#88ff88', points: 10},
                {x: centerX, y: centerY + 60, color: '#ff8888', points: 10},
                {x: centerX - 55, y: centerY + 35, color: '#88ff88', points: 10},
                {x: centerX - 60, y: centerY, color: '#ff8888', points: 10}
            ];
            
            outerPositions.forEach(pos => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 9,
                    color: pos.color, points: pos.points, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
        }

        // Draw Carrom Board
        function drawBoard() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(15, 15, canvas.width - 30, canvas.height - 30);
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
            
            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 2;
            ctx.strokeRect(25, 25, canvas.width - 50, canvas.height - 50);
            
            ctx.beginPath();
            ctx.arc(300, 300, 80, 0, Math.PI * 2);
            ctx.strokeStyle = '#8B4513';
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(300, 300, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('★', 293, 306);
            
            // Draw pockets
            pockets.forEach(pocket => {
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#2c3e50';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius - 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
            });
        }

        function darkenColor(color) {
            const colors = {
                '#44ff44': '#00cc00', '#ff4444': '#cc0000', '#4444ff': '#0000cc',
                '#ffff44': '#cccc00', '#ff8844': '#cc6600', '#ff44ff': '#cc00cc',
                '#44ffff': '#00cccc', '#88ff88': '#44cc44', '#ff8888': '#cc4444'
            };
            return colors[color] || '#666';
        }

        function drawCoins() {
            for (let coin of coins) {
                if (!coin.pocketed) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                    
                    const gradient = ctx.createRadialGradient(coin.x - 3, coin.y - 3, 3, coin.x, coin.y, coin.radius);
                    gradient.addColorStop(0, coin.color);
                    gradient.addColorStop(1, darkenColor(coin.color));
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    if (coin.isQueen) {
                        ctx.font = `${coin.radius}px Arial`;
                        ctx.fillStyle = '#ffd700';
                        ctx.fillText('👑', coin.x - 7, coin.y + 5);
                    }
                    
                    ctx.shadowBlur = 0;
                }
            }
        }

        function drawStriker() {
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            
            ctx.beginPath();
            ctx.arc(striker.x, striker.y, striker.radius, 0, Math.PI * 2);
            
            const gradient = ctx.createRadialGradient(striker.x - 4, striker.y - 4, 4, striker.x, striker.y, striker.radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(1, '#cccccc');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.stroke();
            
            if (!striker.moving && gameActive) {
                const endX = striker.x + Math.cos(aimAngle) * 100;
                const endY = striker.y + Math.sin(aimAngle) * 100;
                
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `rgba(255, 100, 0, ${power / 50})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const powerLength = power / 2;
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x + Math.cos(aimAngle) * powerLength, striker.y + Math.sin(aimAngle) * powerLength);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0;
        }

        function updatePhysics() {
            let anyMoving = striker.moving;
            
            if (striker.moving) {
                striker.x += striker.vx;
                striker.y += striker.vy;
                striker.vx *= friction;
                striker.vy *= friction;
                
                if (striker.x - striker.radius < 45 || striker.x + striker.radius > canvas.width - 45) {
                    striker.vx = -striker.vx * 0.7;
                    striker.x = Math.max(striker.radius + 45, Math.min(canvas.width - striker.radius - 45, striker.x));
                }
                if (striker.y - striker.radius < 45 || striker.y + striker.radius > canvas.height - 45) {
                    striker.vy = -striker.vy * 0.7;
                    striker.y = Math.max(striker.radius + 45, Math.min(canvas.height - striker.radius - 45, striker.y));
                }
                
                if (Math.abs(striker.vx) < 0.2 && Math.abs(striker.vy) < 0.2) {
                    striker.moving = false;
                    striker.vx = 0;
                    striker.vy = 0;
                    checkTurnEnd();
                }
                
                for (let pocket of pockets) {
                    const dx = striker.x - pocket.x;
                    const dy = striker.y - pocket.y;
                    if (Math.sqrt(dx * dx + dy * dy) < pocketRadius) {
                        striker.moving = false;
                        resetStrikerPosition();
                        showMessage('FOUL! Striker pocketed! Turn changes.', true);
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateUI();
                        break;
                    }
                }
            }
            
            for (let coin of coins) {
                if (!coin.pocketed) {
                    coin.x += coin.vx;
                    coin.y += coin.vy;
                    coin.vx *= friction;
                    coin.vy *= friction;
                    
                    if (Math.abs(coin.vx) > 0.01 || Math.abs(coin.vy) > 0.01) anyMoving = true;
                    
                    if (coin.x - coin.radius < 45 || coin.x + coin.radius > canvas.width - 45) {
                        coin.vx = -coin.vx * 0.7;
                        coin.x = Math.max(coin.radius + 45, Math.min(canvas.width - coin.radius - 45, coin.x));
                    }
                    if (coin.y - coin.radius < 45 || coin.y + coin.radius > canvas.height - 45) {
                        coin.vy = -coin.vy * 0.7;
                        coin.y = Math.max(coin.radius + 45, Math.min(canvas.height - coin.radius - 45, coin.y));
                    }
                    
                    for (let pocket of pockets) {
                        const dx = coin.x - pocket.x;
                        const dy = coin.y - pocket.y;
                        if (Math.sqrt(dx * dx + dy * dy) < pocketRadius - 5) {
                            coin.pocketed = true;
                            if (currentPlayer === 1) player1Score += coin.points;
                            else player2Score += coin.points;
                            updateUI();
                            showMessage(`${currentPlayer === 1 ? 'Player 1' : (gameMode === 'bot' ? 'Bot' : 'Player 2')} scored ${coin.points} points!`);
                            break;
                        }
                    }
                    
                    if (striker.moving && !coin.pocketed) {
                        const dx = coin.x - striker.x;
                        const dy = coin.y - striker.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < striker.radius + coin.radius) {
                            const angle = Math.atan2(dy, dx);
                            const speed = Math.sqrt(striker.vx * striker.vx + striker.vy * striker.vy);
                            coin.vx = Math.cos(angle) * speed * 1.2;
                            coin.vy = Math.sin(angle) * speed * 1.2;
                        }
                    }
                }
            }
            
            for (let i = 0; i < coins.length; i++) {
                for (let j = i + 1; j < coins.length; j++) {
                    if (!coins[i].pocketed && !coins[j].pocketed) {
                        const dx = coins[i].x - coins[j].x;
                        const dy = coins[i].y - coins[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < coins[i].radius + coins[j].radius) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = coins[i].radius + coins[j].radius - dist;
                            const moveX = Math.cos(angle) * overlap / 2;
                            const moveY = Math.sin(angle) * overlap / 2;
                            coins[i].x += moveX;
                            coins[i].y += moveY;
                            coins[j].x -= moveX;
                            coins[j].y -= moveY;
                            
                            const tempVx = coins[i].vx;
                            const tempVy = coins[i].vy;
                            coins[i].vx = coins[j].vx;
                            coins[i].vy = coins[j].vy;
                            coins[j].vx = tempVx;
                            coins[j].vy = tempVy;
                        }
                    }
                }
            }
            
            if (!anyMoving && !striker.moving) {
                checkGameComplete();
            }
        }

        function checkTurnEnd() {
            let anyMoving = false;
            for (let coin of coins) {
                if (!coin.pocketed && (Math.abs(coin.vx) > 0.1 || Math.abs(coin.vy) > 0.1)) {
                    anyMoving = true;
                    break;
                }
            }
            
            if (!anyMoving && gameActive) {
                if (gameMode === 'bot' && currentPlayer === 2) {
                    setTimeout(() => botMove(), 500);
                } else {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateUI();
                    showMessage(`${currentPlayer === 1 ? 'Player 1' : (gameMode === 'bot' ? 'Bot' : 'Player 2')}'s turn`);
                }
                resetStrikerPosition();
            }
        }

        function resetStrikerPosition() {
            striker.x = 300;
            if (currentPlayer === 1) striker.y = 540;
            else striker.y = 60;
            striker.vx = 0;
            striker.vy = 0;
            striker.moving = false;
            aimAngle = currentPlayer === 1 ? -Math.PI / 2 : Math.PI / 2;
        }

        function botMove() {
            if (gameMode !== 'bot' || currentPlayer !== 2 || !gameActive || isBotThinking) return;
            isBotThinking = true;
            showMessage('🤖 Bot is aiming...');
            
            setTimeout(() => {
                const activeCoins = coins.filter(c => !c.pocketed);
                if (activeCoins.length > 0) {
                    const target = activeCoins[0];
                    const dx = target.x - striker.x;
                    const dy = target.y - striker.y;
                    aimAngle = Math.atan2(dy, dx);
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    power = Math.min(80, Math.max(30, distance / 5));
                    document.getElementById('powerSlider').value = power;
                    document.getElementById('powerValue').textContent = Math.floor(power);
                } else {
                    power = 50;
                }
                
                setTimeout(() => {
                    shoot();
                    isBotThinking = false;
                }, 500);
            }, 500);
        }

        function shoot() {
            if (!gameActive) return;
            if (striker.moving) return;
            if (power < 5) {
                showMessage('Increase power to shoot!', true);
                return;
            }
            
            striker.vx = Math.cos(aimAngle) * power / 3;
            striker.vy = Math.sin(aimAngle) * power / 3;
            striker.moving = true;
            
            showMessage(`Shot with ${Math.floor(power)}% power!`);
            
            power = 0;
            document.getElementById('powerSlider').value = 0;
            document.getElementById('powerValue').textContent = '0';
        }

        function checkGameComplete() {
            const activeCoins = coins.filter(c => !c.pocketed && !c.isQueen);
            if (activeCoins.length === 0 || player1Score >= 100 || player2Score >= 100) {
                gameActive = false;
                let winnerMsg = '';
                if (player1Score > player2Score) winnerMsg = `🏆 PLAYER 1 WINS! Score: ${player1Score} - ${player2Score} 🏆`;
                else if (player2Score > player1Score) winnerMsg = `🏆 ${gameMode === 'bot' ? 'BOT' : 'PLAYER 2'} WINS! Score: ${player2Score} - ${player1Score} 🏆`;
                else winnerMsg = `🤝 DRAW! Score: ${player1Score} - ${player2Score} 🤝`;
                showMessage(winnerMsg);
                document.getElementById('status').innerHTML = winnerMsg;
            }
        }

        function updateUI() {
            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;
            const player2Label = document.getElementById('player2Label');
            if (player2Label) player2Label.textContent = gameMode === 'bot' ? 'Bot' : 'Player 2';
            
            const turnText = currentPlayer === 1 ? '🎯 Player 1' : (gameMode === 'bot' ? '🤖 Bot' : '🎯 Player 2');
            document.getElementById('turnIndicator').innerHTML = `${turnText}'s Turn`;
        }

            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.style.color = isError ? '#ff6666' : '#ffcc80';
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                if (document.getElementById('status').textContent === msg) {
                    document.getElementById('status').textContent = '';
                }
            }, 2000);
        }

        function resetGame() {
            initCoins();
            player1Score = 0;
            player2Score = 0;
            currentPlayer = 1;
