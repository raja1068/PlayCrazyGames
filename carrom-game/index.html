<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carrom Board Game | PlayCrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2e7d32 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: #0d1b4a;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            color: #ff9800;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
        }

        .turn-box {
            background: #ff9800;
            padding: 8px 20px;
            border-radius: 30px;
            color: #1a237e;
            font-weight: bold;
        }

        .scores {
            display: flex;
            gap: 30px;
        }

        .score {
            text-align: center;
        }

        .score-label {
            font-size: 0.7rem;
            color: #ffcc80;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: crosshair;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .shoot-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .reset-btn {
            background: #2e7d32;
            color: white;
        }

        .back-btn {
            background: #555;
            color: white;
        }

        .power-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.15);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .power-control label {
            color: #ffcc80;
        }

        input {
            width: 150px;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #ffcc80;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            canvas { width: 100%; height: auto; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Carrom Board Game</h1>
        
        <div class="game-info">
            <div class="turn-box" id="turnText">Player 1's Turn</div>
            <div class="scores">
                <div class="score">
                    <div class="score-label">Player 1</div>
                    <div class="score-value" id="score1">0</div>
                </div>
                <div class="score">
                    <div class="score-label">Player 2</div>
                    <div class="score-value" id="score2">0</div>
                </div>
            </div>
        </div>
        
        <canvas id="carromCanvas" width="600" height="600"></canvas>
        
        <div class="controls">
            <div class="power-control">
                <label>💪 Power: <span id="powerVal">0</span>%</label>
                <input type="range" id="powerSlider" min="0" max="100" value="0">
            </div>
            <button id="shootBtn" class="shoot-btn">🔫 SHOOT!</button>
            <button id="resetBtn" class="reset-btn">🔄 New Game</button>
            <button id="backBtn" class="back-btn">🏠 Back</button>
        </div>
        <div class="status" id="status"></div>
        <div class="status" style="font-size:0.7rem">🎯 Mouse over canvas to aim | ⚡ Adjust power | First to 29 wins!</div>
    </div>

    <script>
        // ========================================
        // COMPLETE WORKING CARROM BOARD
        // ========================================
        
        const canvas = document.getElementById('carromCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let currentPlayer = 1;
        let player1Score = 0;
        let player2Score = 0;
        let gameActive = true;
        let winner = null;
        
        // Physics
        let striker = {
            x: 300, y: 540, radius: 10,
            vx: 0, vy: 0, moving: false
        };
        
        let coins = [];
        let power = 0;
        let aimAngle = -Math.PI / 2;
        let mouseX = 300, mouseY = 540;
        
        // 4 pockets (corners only)
        const pockets = [
            {x: 35, y: 35}, {x: 565, y: 35},
            {x: 35, y: 565}, {x: 565, y: 565}
        ];
        
        // Initialize coins - Full Carrom Setup
        function initCoins() {
            coins = [];
            const cx = 300, cy = 300;
            
            // Queen (Red) in center
            coins.push({
                x: cx, y: cy, radius: 11,
                color: '#ff0000', points: 50, isQueen: true,
                vx: 0, vy: 0, pocketed: false
            });
            
            // Inner ring (6 coins around queen)
            const innerPos = [
                {x: cx, y: cy - 30}, {x: cx + 26, y: cy - 15},
                {x: cx + 26, y: cy + 15}, {x: cx, y: cy + 30},
                {x: cx - 26, y: cy + 15}, {x: cx - 26, y: cy - 15}
            ];
            const innerColors = ['#44ff44', '#4444ff', '#ffff44', '#ff8844', '#ff44ff', '#44ffff'];
            innerPos.forEach((pos, i) => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 9,
                    color: innerColors[i], points: 10, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
            
            // Outer ring (9 coins)
            const outerPos = [
                {x: cx - 55, y: cy - 35}, {x: cx, y: cy - 60}, {x: cx + 55, y: cy - 35},
                {x: cx + 60, y: cy}, {x: cx + 55, y: cy + 35}, {x: cx, y: cy + 60},
                {x: cx - 55, y: cy + 35}, {x: cx - 60, y: cy}, {x: cx - 30, y: cy - 50}
            ];
            const outerColors = ['#88ff88', '#ff8888', '#88ff88', '#ff8888', '#88ff88', '#ff8888', '#88ff88', '#ff8888', '#88aa88'];
            outerPos.forEach((pos, i) => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 9,
                    color: outerColors[i], points: 10, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
        }
        
        // Draw the Carrom Board
        function drawBoard() {
            // Wooden base
            ctx.fillStyle = '#6B3E1B';
            ctx.fillRect(0, 0, 600, 600);
            
            // Playing surface
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(15, 15, 570, 570);
            
            // Borders
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.strokeRect(15, 15, 570, 570);
            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 2;
            ctx.strokeRect(25, 25, 550, 550);
            
            // 4 Corner Pockets
            pockets.forEach(pocket => {
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, 18, 0, Math.PI * 2);
                ctx.fillStyle = '#2c3e50';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
            });
            
            // Center Circle
            ctx.beginPath();
            ctx.arc(300, 300, 80, 0, Math.PI * 2);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Red Center
            ctx.beginPath();
            ctx.arc(300, 300, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();
            
            // Star
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('★', 294, 306);
            
            // Cross lines
            ctx.beginPath();
            ctx.moveTo(300, 220);
            ctx.lineTo(300, 380);
            ctx.moveTo(220, 300);
            ctx.lineTo(380, 300);
            ctx.moveTo(243, 243);
            ctx.lineTo(357, 357);
            ctx.moveTo(243, 357);
            ctx.lineTo(357, 243);
            ctx.stroke();
            
            // Baselines
            ctx.beginPath();
            ctx.moveTo(220, 540);
            ctx.lineTo(380, 540);
            ctx.moveTo(220, 60);
            ctx.lineTo(380, 60);
            ctx.strokeStyle = '#ff9800';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Labels
            ctx.fillStyle = '#ff9800';
            ctx.font = '10px Arial';
            ctx.fillText('BASELINE', 250, 530);
            ctx.fillText('BASELINE', 250, 75);
        }
        
        function darken(c) {
            const map = {
                '#44ff44': '#00aa00', '#ff0000': '#aa0000', '#4444ff': '#0000aa',
                '#ffff44': '#aaaa00', '#ff8844': '#aa4400', '#ff44ff': '#aa00aa',
                '#44ffff': '#00aaaa', '#88ff88': '#44aa44', '#ff8888': '#aa4444', '#88aa88': '#448844'
            };
            return map[c] || '#666';
        }
        
        function drawCoins() {
            for (let coin of coins) {
                if (!coin.pocketed) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(coin.x-3, coin.y-3, 3, coin.x, coin.y, coin.radius);
                    grad.addColorStop(0, coin.color);
                    grad.addColorStop(1, darken(coin.color));
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    if (coin.isQueen) {
                        ctx.font = 'bold 14px Arial';
                        ctx.fillStyle = '#ffd700';
                        ctx.fillText('Q', coin.x-5, coin.y+5);
                    }
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        function drawStriker() {
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            
            ctx.beginPath();
            ctx.arc(striker.x, striker.y, striker.radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(striker.x-3, striker.y-3, 3, striker.x, striker.y, striker.radius);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#cccccc');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.stroke();
            
            // Aim line
            if (!striker.moving && gameActive && !winner) {
                const endX = striker.x + Math.cos(aimAngle) * 80;
                const endY = striker.y + Math.sin(aimAngle) * 80;
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `rgba(255,100,0,${power/40})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const pl = power / 2;
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x + Math.cos(aimAngle)*pl, striker.y + Math.sin(aimAngle)*pl);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }
        
        function render() {
            drawBoard();
            drawCoins();
            drawStriker();
        }
        
        // Physics update
        let friction = 0.98;
        function updatePhysics() {
            let moving = striker.moving;
            
            if (striker.moving) {
                striker.x += striker.vx;
                striker.y += striker.vy;
                striker.vx *= friction;
                striker.vy *= friction;
                
                if (striker.x - striker.radius < 30 || striker.x + striker.radius > 570) {
                    striker.vx = -striker.vx * 0.7;
                    striker.x = Math.max(striker.radius+30, Math.min(570-striker.radius, striker.x));
                }
                if (striker.y - striker.radius < 30 || striker.y + striker.radius > 570) {
                    striker.vy = -striker.vy * 0.7;
                    striker.y = Math.max(striker.radius+30, Math.min(570-striker.radius, striker.y));
                }
                
                if (Math.abs(striker.vx) < 0.2 && Math.abs(striker.vy) < 0.2) {
                    striker.moving = false;
                    striker.vx = 0;
                    striker.vy = 0;
                    endTurn();
                }
                
                // Check striker pocket
                for (let p of pockets) {
                    const dx = striker.x - p.x, dy = striker.y - p.y;
                    if (Math.sqrt(dx*dx+dy*dy) < 18) {
                        striker.moving = false;
                        striker.x = 300;
                        striker.y = currentPlayer === 1 ? 540 : 60;
                        document.getElementById('status').innerText = 'FOUL! Striker pocketed!';
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateUI();
                        break;
                    }
                }
            }
            
            // Update coins
            for (let coin of coins) {
                if (!coin.pocketed) {
                    coin.x += coin.vx;
                    coin.y += coin.vy;
                    coin.vx *= friction;
                    coin.vy *= friction;
                    
                    if (Math.abs(coin.vx) > 0.05 || Math.abs(coin.vy) > 0.05) moving = true;
                    
                    if (coin.x - coin.radius < 30 || coin.x + coin.radius > 570) {
                        coin.vx = -coin.vx * 0.7;
                        coin.x = Math.max(coin.radius+30, Math.min(570-coin.radius, coin.x));
                    }
                    if (coin.y - coin.radius < 30 || coin.y + coin.radius > 570) {
                        coin.vy = -coin.vy * 0.7;
                        coin.y = Math.max(coin.radius+30, Math.min(570-coin.radius, coin.y));
                    }
                    
                    for (let p of pockets) {
                        const dx = coin.x - p.x, dy = coin.y - p.y;
                        if (Math.sqrt(dx*dx+dy*dy) < 15) {
                            coin.pocketed = true;
                            let pts = coin.points;
                            if (coin.isQueen) {
                                const others = coins.filter(c => !c.pocketed && !c.isQueen);
                                if (others.length > 0) pts = 50;
                                else pts = 0;
                            }
                            if (currentPlayer === 1) player1Score += pts;
                            else player2Score += pts;
                            updateUI();
                            document.getElementById('status').innerText = `${currentPlayer === 1 ? 'P1' : 'P2'} scored ${pts}!`;
                            
                            if (player1Score >= 29) winGame(1);
                            else if (player2Score >= 29) winGame(2);
                            break;
                        }
                    }
                    
                    if (striker.moving && !coin.pocketed) {
                        const dx = coin.x - striker.x, dy = coin.y - striker.y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if (dist < striker.radius + coin.radius) {
                            const ang = Math.atan2(dy, dx);
                            const sp = Math.sqrt(striker.vx*striker.vx + striker.vy*striker.vy);
                            coin.vx = Math.cos(ang) * sp * 1.2;
                            coin.vy = Math.sin(ang) * sp * 1.2;
                        }
                    }
                }
            }
            
            // Coin collision
            for (let i = 0; i < coins.length; i++) {
                for (let j = i+1; j < coins.length; j++) {
                    if (!coins[i].pocketed && !coins[j].pocketed) {
                        const dx = coins[i].x - coins[j].x;
                        const dy = coins[i].y - coins[j].y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if (dist < coins[i].radius + coins[j].radius) {
                            const ang = Math.atan2(dy, dx);
                            const overlap = coins[i].radius + coins[j].radius - dist;
                            const mx = Math.cos(ang) * overlap / 2;
                            const my = Math.sin(ang) * overlap / 2;
                            coins[i].x += mx;
                            coins[i].y += my;
                            coins[j].x -= mx;
                            coins[j].y -= my;
                            
                            const tvx = coins[i].vx, tvy = coins[i].vy;
                            coins[i].vx = coins[j].vx;
                            coins[i].vy = coins[j].vy;
                            coins[j].vx = tvx;
                            coins[j].vy = tvy;
                        }
                    }
                }
            }
            
            if (!moving && !striker.moving && gameActive && !winner) {
                endTurn();
            }
            
            render();
        }
        
        function endTurn() {
            if (!gameActive || winner) return;
            if (gameMode === 'bot' && currentPlayer === 2) {
                setTimeout(botMove, 500);
            } else {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateUI();
                striker.x = 300;
                striker.y = currentPlayer === 1 ? 540 : 60;
                aimAngle = currentPlayer === 1 ? -Math.PI/2 : Math.PI/2;
                document.getElementById('status').innerText = `${currentPlayer === 1 ? 'Player 1' : (gameMode === 'bot' ? 'Bot' : 'Player 2')}'s turn`;
                render();
            }
        }
        
        function winGame(player) {
            gameActive = false;
            winner = player;
            document.getElementById('status').innerHTML = `🏆 ${player === 1 ? 'PLAYER 1' : (gameMode === 'bot' ? 'BOT' : 'PLAYER 2')} WINS! 🏆`;
        }
        
        function shoot() {
            if (!gameActive || winner) return;
            if (striker.moving) return;
            if (power < 5) {
                document.getElementById('status').innerText = 'Increase power!';
                return;
            }
            striker.vx = Math.cos(aimAngle) * power / 3;
            striker.vy = Math.sin(aimAngle) * power / 3;
            striker.moving = true;
            document.getElementById('status').innerText = `Shot with ${Math.floor(power)}% power!`;
            power = 0;
            document.getElementById('powerSlider').value = 0;
            document.getElementById('powerVal').innerText = '0';
        }
        
        function updateUI() {
            document.getElementById('score1').innerText = player1Score;
            document.getElementById('score2').innerText = player2Score;
            document.getElementById('turnText').innerHTML = currentPlayer === 1 ? 'Player 1\'s Turn' : (gameMode === 'bot' ? 'Bot\'s Turn' : 'Player 2\'s Turn');
        }
        
        function resetGame() {
            initCoins();
            player1Score = 0;
            player2Score = 0;
            currentPlayer = 1;
            gameActive = true;
            winner = null;
            power = 0;
            striker = { x: 300, y: 540, radius: 10, vx: 0, vy: 0, moving: false };
            aimAngle = -Math.PI/2;
            document.getElementById('powerSlider').value = 0;
            document.getElementById('powerVal').innerText = '0';
            updateUI();
            document.getElementById('status').innerText = 'Game Reset! First to 29 wins!';
            render();
        }
        
        let gameMode = 'bot';
        let isBotTurn = false;
        
        function botMove() {
            if (gameMode !== 'bot' || currentPlayer !== 2 || !gameActive || winner || isBotTurn) return;
            isBotTurn = true;
            setTimeout(() => {
                if (currentPlayer === 2 && gameActive && !winner) {
                    const targets = coins.filter(c => !c.pocketed);
                    if (targets.length > 0) {
                        const t = targets[0];
                        const dx = t.x - striker.x;
                        const dy = t.y - striker.y;
                        aimAngle = Math.atan2(dy, dx);
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        power = Math.min(80, Math.max(25, dist/3.5));
                        document.getElementById('powerSlider').value = power;
                        document.getElementById('powerVal').innerText = Math.floor(power);
                        setTimeout(() => {
                            shoot();
                            isBotTurn = false;
                        }, 400);
                    } else {
                        isBotTurn = false;
                    }
                } else {
                    isBotTurn = false;
                }
            }, 400);
        }
        
        // Mouse aim
        canvas.addEventListener('mousemove', (e) => {
            if (striker.moving) return;
            if (gameMode === 'bot' && currentPlayer === 2) return;
            const rect = canvas.getBoundingClientRect();
            const sx = 600 / rect.width;
            const sy = 600 / rect.height;
            const mx = (e.clientX - rect.left) * sx;
            const my = (e.clientY - rect.top) * sy;
            const dx = mx - striker.x;
            const dy = my - striker.y;
            aimAngle = Math.atan2(dy, dx);
            render();
        });
        
        // Power slider
        document.getElementById('powerSlider').addEventListener('input', (e) => {
            power = parseInt(e.target.value);
            document.getElementById('powerVal').innerText = power;
        });
        
        // Buttons
        document.getElementById('shootBtn').addEventListener('click', () => shoot());
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        document.getElementById('backBtn').addEventListener('click', () => window.location.href = '../index.html');
        
        // Initialize
        initCoins();
        resetGame();
        
        // Game loop
        function gameLoop() {
            updatePhysics();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        
        console.log('Carrom Board Loaded!');
    </script>
</body>
</html>
