<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Classic Carrom Board Game - Play with Bot or Friend! Aim, shoot, pocket coins!">
    <title>Carrom Board Game | PlayCrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            background: white;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: #2e7d32;
            color: white;
            transform: translateX(-5px);
        }

        .game-container {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ffcc80;
            font-size: 0.85rem;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            background: #ff9800;
            color: #1a237e;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .scores {
            display: flex;
            gap: 25px;
        }

        .score-card {
            text-align: center;
            padding: 5px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .score-label {
            font-size: 0.7rem;
            color: #ffcc80;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #carromCanvas {
            background: #DEB887;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: crosshair;
            display: block;
            width: 600px;
            height: 600px;
        }

        .controls-panel {
            width: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }

        .power-control {
            margin-bottom: 20px;
        }

        .power-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #powerSlider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        #powerSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff9800;
            border-radius: 50%;
            cursor: pointer;
        }

        #powerValue {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
            margin-top: 10px;
        }

        .striker-control {
            margin-bottom: 20px;
            text-align: center;
        }

        .striker-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .striker-position {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .striker-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .striker-btn:hover {
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .shoot-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shoot-btn:hover {
            transform: scale(1.05);
        }

        .reset-btn, .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover, .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #ffcc80;
            min-height: 40px;
        }

        .instructions {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.7rem;
            color: #ffcc80;
            text-align: center;
        }

        @media (max-width: 950px) {
            #carromCanvas { width: 500px; height: 500px; }
        }

        @media (max-width: 850px) {
            .game-area { flex-direction: column; align-items: center; }
            .controls-panel { width: 100%; max-width: 400px; }
            .action-buttons { flex-direction: row; flex-wrap: wrap; justify-content: center; }
        }

        @media (max-width: 550px) {
            #carromCanvas { width: 100%; height: auto; }
            .game-container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <a href="../index.html" class="back-home">← Back to Games Hub</a>
        
        <div class="game-container">
            <div class="game-header">
                <h1>🎯 Carrom Board</h1>
                <p class="subtitle">Classic Indian Board Game | Play with Bot or Friend!</p>
            </div>
            
            <div class="mode-selector">
                <button id="botModeBtn" class="mode-btn active">🤖 Play with Bot</button>
                <button id="twoPlayerModeBtn" class="mode-btn">👥 Two Player</button>
            </div>
            
            <div class="game-info">
                <div class="turn-indicator" id="turnIndicator">
                    🎯 Player 1's Turn
                </div>
                <div class="scores">
                    <div class="score-card">
                        <div class="score-label">Player 1</div>
                        <div class="score-value" id="player1Score">0</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label" id="player2Label">Bot</div>
                        <div class="score-value" id="player2Score">0</div>
                    </div>
                </div>
            </div>
            
            <div class="game-area">
                <canvas id="carromCanvas" width="600" height="600"></canvas>
                
                <div class="controls-panel">
                    <div class="power-control">
                        <label>💪 POWER: <span id="powerValue">0</span>%</label>
                        <input type="range" id="powerSlider" min="0" max="100" value="0">
                    </div>
                    
                    <div class="striker-control">
                        <label>🎯 STRIKER POSITION</label>
                        <div class="striker-position">
                            <button id="strikerLeft" class="striker-btn">◀</button>
                            <button id="strikerCenter" class="striker-btn">●</button>
                            <button id="strikerRight" class="striker-btn">▶</button>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="shootBtn" class="shoot-btn">🔫 SHOOT!</button>
                        <button id="resetBtn" class="reset-btn">🔄 New Game</button>
                        <button id="backBtn" class="back-btn">🏠 Games Hub</button>
                    </div>
                </div>
            </div>
            
            <div class="status" id="status"></div>
            <div class="instructions">
                🎯 Move mouse to aim | 💪 Adjust power slider | 🎮 Move striker with buttons | Click SHOOT to play!
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // COMPLETE CARROM BOARD GAME - FIXED VERSION
        // ========================================

        const canvas = document.getElementById('carromCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game Mode
        let gameMode = 'bot';
        let isBotThinking = false;

        // Game State
        let currentPlayer = 1;
        let player1Score = 0;
        let player2Score = 0;
        let gameActive = true;

        // Physics
        let friction = 0.98;
        let pocketRadius = 22;
        let striker = {
            x: 300,
            y: 540,
            radius: 12,
            vx: 0,
            vy: 0,
            moving: false
        };

        let coins = [];
        let power = 0;
        let aimAngle = -Math.PI / 2;
        let animationId = null;

        // Pocket positions
        const pockets = [
            {x: 30, y: 30}, {x: 300, y: 30}, {x: 570, y: 30},
            {x: 30, y: 570}, {x: 300, y: 570}, {x: 570, y: 570}
        ];

        // Initialize coins
        function initCoins() {
            coins = [];
            const cx = 300;
            const cy = 300;
            
            // Red Queen in center
            coins.push({
                x: cx, y: cy, radius: 12,
                color: '#ff4444', points: 50, isQueen: true,
                vx: 0, vy: 0, pocketed: false
            });
            
            // Inner ring (6 coins)
            const innerPos = [
                {x: cx, y: cy - 32, color: '#44ff44'},
                {x: cx + 28, y: cy - 16, color: '#4444ff'},
                {x: cx + 28, y: cy + 16, color: '#ffff44'},
                {x: cx, y: cy + 32, color: '#ff8844'},
                {x: cx - 28, y: cy + 16, color: '#ff44ff'},
                {x: cx - 28, y: cy - 16, color: '#44ffff'}
            ];
            innerPos.forEach(pos => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 10,
                    color: pos.color, points: 10, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
            
            // Outer ring (8 coins)
            const outerPos = [
                {x: cx - 55, y: cy - 38, color: '#88ff88'},
                {x: cx, y: cy - 62, color: '#ff8888'},
                {x: cx + 55, y: cy - 38, color: '#88ff88'},
                {x: cx + 62, y: cy, color: '#ff8888'},
                {x: cx + 55, y: cy + 38, color: '#88ff88'},
                {x: cx, y: cy + 62, color: '#ff8888'},
                {x: cx - 55, y: cy + 38, color: '#88ff88'},
                {x: cx - 62, y: cy, color: '#ff8888'}
            ];
            outerPos.forEach(pos => {
                coins.push({
                    x: pos.x, y: pos.y, radius: 9,
                    color: pos.color, points: 10, isQueen: false,
                    vx: 0, vy: 0, pocketed: false
                });
            });
        }

        // Draw Carrom Board
        function drawBoard() {
            // Wooden border
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 0, 600, 600);
            
            // Playing surface
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(15, 15, 570, 570);
            
            // Outer border
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.strokeRect(15, 15, 570, 570);
            
            // Inner border
            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 2;
            ctx.strokeRect(25, 25, 550, 550);
            
            // Center circle
            ctx.beginPath();
            ctx.arc(300, 300, 80, 0, Math.PI * 2);
            ctx.strokeStyle = '#8B4513';
            ctx.stroke();
            
            // Center red circle
            ctx.beginPath();
            ctx.arc(300, 300, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('★', 293, 306);
            
            // Cross lines
            ctx.beginPath();
            ctx.moveTo(300, 220);
            ctx.lineTo(300, 380);
            ctx.moveTo(220, 300);
            ctx.lineTo(380, 300);
            ctx.stroke();
            
            // Draw pockets
            pockets.forEach(pocket => {
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#2c3e50';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius - 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
            });
        }

        function darkenColor(color) {
            const map = {
                '#44ff44': '#00aa00', '#ff4444': '#aa0000', '#4444ff': '#0000aa',
                '#ffff44': '#aaaa00', '#ff8844': '#aa4400', '#ff44ff': '#aa00aa',
                '#44ffff': '#00aaaa', '#88ff88': '#44aa44', '#ff8888': '#aa4444'
            };
            return map[color] || '#666';
        }

        function drawCoins() {
            for (let coin of coins) {
                if (!coin.pocketed) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                    
                    const grad = ctx.createRadialGradient(coin.x - 3, coin.y - 3, 3, coin.x, coin.y, coin.radius);
                    grad.addColorStop(0, coin.color);
                    grad.addColorStop(1, darkenColor(coin.color));
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    if (coin.isQueen) {
                        ctx.font = 'bold 16px Arial';
                        ctx.fillStyle = '#ffd700';
                        ctx.fillText('👑', coin.x - 8, coin.y + 6);
                    }
                    
                    ctx.shadowBlur = 0;
                }
            }
        }

        function drawStriker() {
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            
            ctx.beginPath();
            ctx.arc(striker.x, striker.y, striker.radius, 0, Math.PI * 2);
            
            const grad = ctx.createRadialGradient(striker.x - 4, striker.y - 4, 4, striker.x, striker.y, striker.radius);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#cccccc');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.stroke();
            
            if (!striker.moving && gameActive) {
                const endX = striker.x + Math.cos(aimAngle) * 80;
                const endY = striker.y + Math.sin(aimAngle) * 80;
                
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `rgba(255, 100, 0, ${power / 50})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const powerLen = power / 2;
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x + Math.cos(aimAngle) * powerLen, striker.y + Math.sin(aimAngle) * powerLen);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0;
        }

        function updatePhysics() {
            let anyMoving = striker.moving;
            
            if (striker.moving) {
                striker.x += striker.vx;
                striker.y += striker.vy;
                striker.vx *= friction;
                striker.vy *= friction;
                
                if (striker.x - striker.radius < 45 || striker.x + striker.radius > 555) {
                    striker.vx = -striker.vx * 0.7;
                    striker.x = Math.max(striker.radius + 45, Math.min(555 - striker.radius, striker.x));
                }
                if (striker.y - striker.radius < 45 || striker.y + striker.radius > 555) {
                    striker.vy = -striker.vy * 0.7;
                    striker.y = Math.max(striker.radius + 45, Math.min(555 - striker.radius, striker.y));
                }
                
                if (Math.abs(striker.vx) < 0.2 && Math.abs(striker.vy) < 0.2) {
                    striker.moving = false;
                    striker.vx = 0;
                    striker.vy = 0;
                    checkTurnEnd();
                }
                
                for (let pocket of pockets) {
                    const dx = striker.x - pocket.x;
                    const dy = striker.y - pocket.y;
                    if (Math.sqrt(dx*dx + dy*dy) < pocketRadius) {
                        striker.moving = false;
                        resetStrikerPosition();
                        showMessage('FOUL! Striker pocketed!', true);
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateUI();
                        break;
                    }
                }
            }
            
            for (let coin of coins) {
                if (!coin.pocketed) {
                    coin.x += coin.vx;
                    coin.y += coin.vy;
                    coin.vx *= friction;
                    coin.vy *= friction;
                    
                    if (Math.abs(coin.vx) > 0.05 || Math.abs(coin.vy) > 0.05) anyMoving = true;
                    
                    if (coin.x - coin.radius < 45 || coin.x + coin.radius > 555) {
                        coin.vx = -coin.vx * 0.7;
                        coin.x = Math.max(coin.radius + 45, Math.min(555 - coin.radius, coin.x));
                    }
                    if (coin.y - coin.radius < 45 || coin.y + coin.radius > 555) {
                        coin.vy = -coin.vy * 0.7;
                        coin.y = Math.max(coin.radius + 45, Math.min(555 - coin.radius, coin.y));
                    }
                    
                    for (let pocket of pockets) {
                        const dx = coin.x - pocket.x;
                        const dy = coin.y - pocket.y;
                        if (Math.sqrt(dx*dx + dy*dy) < pocketRadius - 5) {
                            coin.pocketed = true;
                            if (currentPlayer === 1) player1Score += coin.points;
                            else player2Score += coin.points;
                            updateUI();
                            showMessage(`${currentPlayer === 1 ? 'Player 1' : (gameMode === 'bot' ? 'Bot' : 'Player 2')} scored ${coin.points}!`);
                            break;
                        }
                    }
                    
                    if (striker.moving && !coin.pocketed) {
                        const dx = coin.x - striker.x;
                        const dy = coin.y - striker.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < striker.radius + coin.radius) {
                            const angle = Math.atan2(dy, dx);
                            const speed = Math.sqrt(striker.vx*striker.vx + striker.vy*striker.vy);
                            coin.vx = Math.cos(angle) * speed * 1.2;
                            coin.vy = Math.sin(angle) * speed * 1.2;
                        }
                    }
                }
            }
            
            for (let i = 0; i < coins.length; i++) {
                for (let j = i+1; j < coins.length; j++) {
                    if (!coins[i].pocketed && !coins[j].pocketed) {
                        const dx = coins[i].x - coins[j].x;
                        const dy = coins[i].y - coins[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < coins[i].radius + coins[j].radius) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = coins[i].radius + coins[j].radius - dist;
                            const moveX = Math.cos(angle) * overlap / 2;
                            const moveY = Math.sin(angle) * overlap / 2;
                            coins[i].x += moveX;
                            coins[i].y += moveY;
                            coins[j].x -= moveX;
                            coins[j].y -= moveY;
                            
                            const tempVx = coins[i].vx;
                            const tempVy = coins[i].vy;
                            coins[i].vx = coins[j].vx;
                            coins[i].vy = coins[j].vy;
                            coins[j].vx = tempVx;
                            coins[j].vy = tempVy;
                        }
                    }
                }
            }
            
            if (!anyMoving && !striker.moving) {
                checkGameComplete();
            }
            
            render();
        }

        function checkTurnEnd() {
            let anyMoving = false;
            for (let coin of coins) {
                if (!coin.pocketed && (Math.abs(coin.vx) > 0.1 || Math.abs(coin.vy) > 0.1)) {
                    anyMoving = true;
                    break;
                }
            }
            
            if (!anyMoving && gameActive) {
                if (gameMode === 'bot' && currentPlayer === 2) {
                    setTimeout(() => botMove(), 500);
                } else {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateUI();
                    showMessage(`${currentPlayer === 1 ? 'Player 1' : (gameMode === 'bot' ? 'Bot' : 'Player 2')}'s turn`);
                }
                resetStrikerPosition();
                render();
            }
        }

        function resetStrikerPosition() {
            striker.x = 300;
            striker.y = currentPlayer === 1 ? 540 : 60;
            striker.vx = 0;
            striker.vy = 0;
            striker.moving = false;
            aimAngle = currentPlayer === 1 ? -Math.PI / 2 : Math.PI / 2;
        }

        function botMove() {
            if (gameMode !== 'bot' || currentPlayer !== 2 || !gameActive || isBotThinking) return;
            isBotThinking = true;
            showMessage('🤖 Bot is aiming...');
            
            setTimeout(() => {
                const active = coins.filter(c => !c.pocketed);
                if (active.length > 0) {
                    const target = active[0];
                    const dx = target.x - striker.x;
                    const dy = target.y - striker.y;
                    aimAngle = Math.atan2(dy, dx);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    power = Math.min(80, Math.max(30, dist / 5));
                    document.getElementById('powerSlider').value = power;
                    document.getElementById('powerValue').textContent = Math.floor(power);
                } else {
                    power = 50;
                }
                
                setTimeout(() => {
                    shoot();
                    isBotThinking = false;
                }, 500);
            }, 500);
        }

        function shoot() {
            if (!gameActive) return;
            if (striker.moving) return;
            if (power < 5) {
                showMessage('Increase power!', true);
                return;
            }
            
            striker.vx = Math.cos(aimAngle) * power / 3;
            striker.vy = Math.sin(aimAngle) * power / 3;
            striker.moving = true;
            
            showMessage(`Shot with ${Math.floor(power)}% power!`);
            
            power = 0;
            document.getElementById('powerSlider').value = 0;
            document.getElementById('powerValue').textContent = '0';
        }

        function checkGameComplete() {
            const active = coins.filter(c => !c.pocketed && !c.isQueen);
            if (active.length === 0 || player1Score >= 100 || player2Score >= 100) {
                gameActive = false;
                let msg = '';
                if (player1Score > player2Score) msg = `🏆 PLAYER 1 WINS! ${player1Score} - ${player2Score} 🏆`;
                else if (player2Score > player1Score) msg = `🏆 ${gameMode === 'bot' ? 'BOT' : 'PLAYER 2'} WINS! ${player2Score} - ${player1Score} 🏆`;
                else msg = `🤝 DRAW! ${player1Score} - ${player2Score} 🤝`;
                showMessage(msg);
                document.getElementById('status').innerHTML = msg;
            }
        }

        function updateUI() {
            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;
            const p2Label = document.getElementById('player2Label');
            if (p2Label) p2Label.textContent = gameMode === 'bot' ? 'Bot' : 'Player 2';
            
            const turnText = currentPlayer === 1 ? '🎯 Player 1' : (gameMode === 'bot' ? '🤖 Bot' : '🎯 Player 2');
            document.getElementById('turnIndicator').innerHTML = `${turnText}'s Turn`;
        }

        let msgTimeout;
        function showMessage(msg, isErr = false) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.style.color = isErr ? '#ff6666' : '#ffcc80';
            if (msgTimeout) clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                if (document.getElementById('status').textContent === msg) {
                    document.getElementById('status').textContent = '';
                }
            }, 2000);
        }

        function resetGame() {
            initCoins();
            player1Score = 0;
            player2Score = 0;
            currentPlayer = 1;
            gameActive = true;
            power = 0;
            aimAngle = -Math.PI / 2;
            resetStrikerPosition();
            updateUI();
            showMessage('Game Reset! Player 1 starts');
            document.getElementById('powerSlider').value = 0;
            document.getElementById('powerValue').textContent = '0';
            render();
        }

        function setMode(mode) {
            gameMode = mode;
            resetGame();
            const botBtn = document.getElementById('botModeBtn');
            const twoBtn = document.getElementById('twoPlayerModeBtn');
            if (mode === 'bot') {
                botBtn.classList.add('active');
                twoBtn.classList.remove('active');
                document.getElementById('player2Label').textContent = 'Bot';
            } else {
                twoBtn.classList.add('active');
                botBtn.classList.remove('active');
                document.getElementById('player2Label').textContent = 'Player 2';
            }
        }

        // Mouse aim
        let mouseX = 300, mouseY = 540;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = 600 / rect.width;
            const scaleY = 600 / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            
            if (!striker.moving && gameActive && currentPlayer === 1 && gameMode !== 'bot') {
                const dx = mouseX - striker.x;
                const dy = mouseY - striker.y;
                aimAngle = Math.atan2(dy, dx);
            }
        });

        // Touch aim for mobile
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = 600 / rect.width;
            const scaleY = 600 / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            
            if (!striker.moving && gameActive && currentPlayer === 1 && gameMode !== 'bot') {
                const dx = mouseX - striker.x;
                const dy = mouseY - striker.y;
                aimAngle = Math.atan2(dy, dx);
            }
        });

        // Event Listeners
        document.getElementById('botModeBtn').addEventListener('click', () => setMode('bot'));
        document.getElementById('twoPlayerModeBtn').addEventListener('click', () => setMode('twoPlayer'));
        document.getElementById('shootBtn').addEventListener('click', () => shoot());
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        document.getElementById('backBtn').addEventListener('click', () => { window.location.href = '../index.html'; });
        
        document.getElementById('powerSlider').addEventListener('input', (e) => {
            power = parseInt(e.target.value);
            document.getElementById('powerValue').textContent = power;
        });
        
        document.getElementById('strikerLeft').addEventListener('click', () => {
            if (!striker.moving && gameActive) {
                striker.x = Math.max(250, striker.x - 50);
                render();
            }
        });
        document.getElementById('strikerCenter').addEventListener('click', () => {
            if (!striker.moving && gameActive) {
                striker.x = 300;
                render();
            }
        });
        document.getElementById('strikerRight').addEventListener('click', () => {
            if (!striker.moving && gameActive) {
                striker.x = Math.min(350, striker.x + 50);
                render();
            }
        });

        function render() {
            drawBoard();
            drawCoins();
            drawStriker();
        }

        // Game Loop
        function gameLoop() {
            updatePhysics();
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        initCoins();
        resetStrikerPosition();
        render();
        gameLoop();
        
        console.log('🎯 Carrom Board Game Loaded!');
    </script>
</body>
</html>
