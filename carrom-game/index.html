<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Carrom Web</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            margin-top: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #f3d2a2; /* Light Orange Board */
            border: 15px solid #5d4037;
            border-radius: 10px;
            cursor: crosshair;
        }
        #ui-layer {
            position: absolute;
            top: -40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .controls {
            margin-top: 15px;
            background: #34495e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        #power-bar-container {
            width: 200px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin: 10px auto;
            display: none;
        }
        #power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #e67e22;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="p1-score">Player 1: 0</div>
            <div id="turn-display" style="color: #e67e22;">Current Player: 1</div>
            <div id="p2-score">Player 2: 0</div>
        </div>
        <canvas id="carromBoard" width="600" height="600"></canvas>
    </div>

    <div class="controls">
        <div id="power-bar-container"><div id="power-bar"></div></div>
        <button onclick="resetGame()">Run / Reset Game</button>
        <p>Drag Striker on baseline | Pull back to aim | Release to shoot</p>
    </div>

<script>
    const canvas = document.getElementById('carromBoard');
    const ctx = canvas.getContext('2d');
    const p1Display = document.getElementById('p1-score');
    const p2Display = document.getElementById('p2-score');
    const turnDisplay = document.getElementById('turn-display');
    const powerBar = document.getElementById('power-bar');
    const powerContainer = document.getElementById('power-bar-container');

    // Game Constants
    const FRICTION = 0.985;
    const POCKET_RADIUS = 35;
    const COIN_RADIUS = 12;
    const STRIKER_RADIUS = 18;
    const BOARD_SIZE = 600;

    let currentPlayer = 1;
    let p1Score = 0;
    let p2Score = 0;
    let coins = [];
    let striker;
    let isDragging = false;
    let isAiming = false;
    let dragStartX, dragStartY;

    class Piece {
        constructor(x, y, radius, color, value, isStriker = false) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.value = value;
            this.isStriker = isStriker;
            this.velX = 0;
            this.velY = 0;
            this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // Add inner detail
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
            ctx.stroke();
            ctx.closePath();
        }

        update() {
            if (this.inPocket) return;

            this.x += this.velX;
            this.y += this.velY;
            this.velX *= FRICTION;
            this.velY *= FRICTION;

            if (Math.abs(this.velX) < 0.1) this.velX = 0;
            if (Math.abs(this.velY) < 0.1) this.velY = 0;

            // Wall Collisions
            if (this.x - this.radius < 0 || this.x + this.radius > BOARD_SIZE) {
                this.velX *= -0.8;
                this.x = this.x < this.radius ? this.radius : BOARD_SIZE - this.radius;
            }
            if (this.y - this.radius < 0 || this.y + this.radius > BOARD_SIZE) {
                this.velY *= -0.8;
                this.y = this.y < this.radius ? this.radius : BOARD_SIZE - this.radius;
            }

            // Pocket Detection
            const pockets = [[0,0], [600,0], [0,600], [600,600]];
            pockets.forEach(p => {
                const dist = Math.hypot(this.x - p[0], this.y - p[1]);
                if (dist < POCKET_RADIUS) {
                    this.pocket();
                }
            });
        }

        pocket() {
            this.inPocket = true;
            this.velX = 0;
            this.velY = 0;
            if (!this.isStriker) {
                if (currentPlayer === 1) p1Score += this.value;
                else p2Score += this.value;
                updateScore();
            } else {
                // Foul: Striker pocketed
                setTimeout(() => this.resetStriker(), 500);
            }
        }

        resetStriker() {
            this.inPocket = false;
            this.x = 300;
            this.y = 485;
            this.velX = 0;
            this.velY = 0;
        }
    }

    function initBoard() {
        coins = [];
        // Queen (Red)
        coins.push(new Piece(300, 300, COIN_RADIUS, "#e74c3c", 5));
        
        // Inner Circle (White and Black)
        for (let i = 0; i < 6; i++) {
            const angle = (i * 60) * Math.PI / 180;
            const color = i % 2 === 0 ? "#fff" : "#333";
            coins.push(new Piece(
                300 + Math.cos(angle) * 35,
                300 + Math.sin(angle) * 35,
                COIN_RADIUS, color, 1
            ));
        }

        striker = new Piece(300, 485, STRIKER_RADIUS, "#ecf0f1", 0, true);
    }

    function drawBoardDesign() {
        // Pockets
        ctx.fillStyle = "#1a1a1a";
        [ [0,0], [600,0], [0,600], [600,600] ].forEach(p => {
            ctx.beginPath();
            ctx.arc(p[0], p[1], POCKET_RADIUS, 0, Math.PI * 2);
            ctx.fill();
        });

        // Center Design
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(300, 300, 80, 0, Math.PI * 2);
        ctx.stroke();

        // Baselines
        ctx.beginPath();
        ctx.rect(100, 470, 400, 30); // Player 1 bottom line
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(100, 485, 15, 0, Math.PI*2); // Left circle
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(500, 485, 15, 0, Math.PI*2); // Right circle
        ctx.stroke();
    }

    function resolveCollision(p1, p2) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const distance = Math.hypot(dx, dy);

        if (distance < p1.radius + p2.radius) {
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);

            // Simple elastic collision
            const vx1 = p1.velX * cos + p1.velY * sin;
            const vy1 = p1.velY * cos - p1.velX * sin;
            const vx2 = p2.velX * cos + p2.velY * sin;
            const vy2 = p2.velY * cos - p2.velX * sin;

            const v1Final = vx2;
            const v2Final = vx1;

            p1.velX = v1Final * cos - vy1 * sin;
            p1.velY = vy1 * cos + v1Final * sin;
            p2.velX = v2Final * cos - vy2 * sin;
            p2.velY = vy2 * cos + v2Final * sin;

            // Prevent overlap
            const overlap = (p1.radius + p2.radius - distance) / 2;
            p1.x -= overlap * cos;
            p1.y -= overlap * sin;
            p2.x += overlap * cos;
            p2.y += overlap * sin;
        }
    }

    function updateScore() {
        p1Display.innerText = `Player 1: ${p1Score}`;
        p2Display.innerText = `Player 2: ${p2Score}`;
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBoardDesign();

        let allStopped = true;

        striker.update();
        striker.draw();
        if (striker.velX !== 0 || striker.velY !== 0) allStopped = false;

        coins.forEach(coin => {
            coin.update();
            coin.draw();
            if (coin.velX !== 0 || coin.velY !== 0) allStopped = false;
            resolveCollision(striker, coin);
        });

        // Nested loop for coin-to-coin collision
        for (let i = 0; i < coins.length; i++) {
            for (let j = i + 1; j < coins.length; j++) {
                resolveCollision(coins[i], coins[j]);
            }
        }

        if (isAiming) {
            ctx.beginPath();
            ctx.moveTo(striker.x, striker.y);
            ctx.lineTo(dragStartX, dragStartY);
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(gameLoop);
    }

    // Input Handling
    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // Position Striker
        if (mouseY > 450 && mouseY < 520 && Math.abs(striker.velX) < 0.1) {
            if (Math.hypot(mouseX - striker.x, mouseY - striker.y) < striker.radius) {
                isAiming = true;
                dragStartX = mouseX;
                dragStartY = mouseY;
                powerContainer.style.display = 'block';
            } else {
                striker.x = Math.max(120, Math.min(480, mouseX));
            }
        }
    });

    window.addEventListener('mousemove', e => {
        if (isAiming) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const dist = Math.hypot(mouseX - dragStartX, mouseY - dragStartY);
            const power = Math.min(dist / 2, 100);
            powerBar.style.width = power + '%';
        }
    });

    window.addEventListener('mouseup', e => {
        if (isAiming) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const dx = dragStartX - mouseX;
            const dy = dragStartY - mouseY;
            
            striker.velX = dx * 0.15;
            striker.velY = dy * 0.15;
            
            isAiming = false;
            powerContainer.style.display = 'none';
            powerBar.style.width = '0%';
            
            // Switch turns after a delay
            setTimeout(() => {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                turnDisplay.innerText = `Current Player: ${currentPlayer}`;
            }, 2000);
        }
    });

    function resetGame() {
        p1Score = 0;
        p2Score = 0;
        currentPlayer = 1;
        updateScore();
        initBoard();
    }

    initBoard();
    gameLoop();
</script>
</body>
</html>
