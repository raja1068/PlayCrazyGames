<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carrom Lite</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #eee;
      margin: 0;
    }
    canvas {
      background: #f5deb3;
      border: 10px solid #8b4513;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <canvas id="carromBoard" width="600" height="600"></canvas>
  <script>
    const canvas = document.getElementById("carromBoard");
    const ctx = canvas.getContext("2d");

    class Coin {
      constructor(x, y, radius, color) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.vx = 0;
        this.vy = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.closePath();
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98; // friction
        this.vy *= 0.98;
      }
    }

    const striker = new Coin(300, 550, 15, "black");
    const coins = [
      new Coin(300, 300, 10, "white"),
      new Coin(320, 300, 10, "red"),
      new Coin(280, 300, 10, "white")
    ];

    let isDragging = false;
    let dragStart = null;

    canvas.addEventListener("mousedown", e => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      if (Math.hypot(mouseX - striker.x, mouseY - striker.y) < striker.radius) {
        isDragging = true;
        dragStart = { x: mouseX, y: mouseY };
      }
    });

    canvas.addEventListener("mouseup", e => {
      if (isDragging) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        striker.vx = (dragStart.x - mouseX) / 10;
        striker.vy = (dragStart.y - mouseY) / 10;
        isDragging = false;
      }
    });

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      striker.update();
      striker.draw();

      coins.forEach(c => {
        c.update();
        c.draw();
      });

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
