<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Classic Carrom Board Game - Play with Bot or Friend! Aim, shoot, pocket coins!">
    <meta name="keywords" content="carrom, board game, striker, carrom game, offline game">
    <title>Carrom Board Game - Play with Bot | PlayCrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-top, .ad-bottom {
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.95);
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            border-radius: 12px;
        }

        .ad-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
        }

        .game-wrapper {
            max-width: 950px;
            width: 100%;
            margin: 0 auto;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            background: white;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: #2e7d32;
            color: white;
            transform: translateX(-5px);
        }

        .game-container {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ffcc80;
            font-size: 0.85rem;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            background: #ff9800;
            color: #1a237e;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .scores {
            display: flex;
            gap: 25px;
        }

        .score-card {
            text-align: center;
            padding: 5px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .score-label {
            font-size: 0.7rem;
            color: #ffcc80;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-container {
            position: relative;
        }

        #carromCanvas {
            background: #DEB887;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: crosshair;
            display: block;
        }

        /* Controls Panel */
        .controls-panel {
            width: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }

        .power-control {
            margin-bottom: 20px;
        }

        .power-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #powerSlider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        #powerSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff9800;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #powerValue {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
            margin-top: 10px;
        }

        .striker-control {
            margin-bottom: 20px;
            text-align: center;
        }

        .striker-control label {
            display: block;
            color: #ffcc80;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .striker-position {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .striker-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .striker-btn:hover {
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .shoot-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shoot-btn:hover {
            transform: scale(1.05);
        }

        .reset-btn, .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover, .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #ffcc80;
            min-height: 40px;
        }

        .instructions {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.7rem;
            color: #ffcc80;
            text-align: center;
        }

        @media (max-width: 900px) {
            .controls-panel { width: 200px; padding: 15px; }
            .striker-btn { width: 35px; height: 35px; font-size: 1rem; }
        }

        @media (max-width: 800px) {
            .game-area { flex-direction: column; align-items: center; }
            .controls-panel { width: 100%; max-width: 400px; }
            .action-buttons { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .shoot-btn, .reset-btn, .back-btn { padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-wrapper">
        <a href="../index.html" class="back-home">← Back to Games Hub</a>
        
        <div class="game-container">
            <div class="game-header">
                <h1>🎯 Carrom Board</h1>
                <p class="subtitle">Classic Indian Board Game | Play with Bot or Friend!</p>
            </div>
            
            <!-- Mode Selector -->
            <div class="mode-selector">
                <button id="botModeBtn" class="mode-btn active">🤖 Play with Bot</button>
                <button id="twoPlayerModeBtn" class="mode-btn">👥 Two Player</button>
            </div>
            
            <div class="game-info">
                <div class="turn-indicator" id="turnIndicator">
                    🎯 Player 1's Turn
                </div>
                <div class="scores">
                    <div class="score-card">
                        <div class="score-label">Player 1</div>
                        <div class="score-value" id="player1Score">0</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">Player 2</div>
                        <div class="score-value" id="player2Score">0</div>
                    </div>
                </div>
            </div>
            
            <div class="game-area">
                <div class="board-container">
                    <canvas id="carromCanvas" width="600" height="600"></canvas>
                </div>
                
                <div class="controls-panel">
                    <div class="power-control">
                        <label>💪 POWER: <span id="powerValue">0</span>%</label>
                        <input type="range" id="powerSlider" min="0" max="100" value="0">
                    </div>
                    
                    <div class="striker-control">
                        <label>🎯 STRIKER POSITION</label>
                        <div class="striker-position">
                            <button id="strikerLeft" class="striker-btn">◀</button>
                            <button id="strikerCenter" class="striker-btn">●</button>
                            <button id="strikerRight" class="striker-btn">▶</button>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="shootBtn" class="shoot-btn">🔫 SHOOT!</button>
                        <button id="resetBtn" class="reset-btn">🔄 New Game</button>
                        <button id="backBtn" class="back-btn">🏠 Games Hub</button>
                    </div>
                </div>
            </div>
            
            <div class="status" id="status"></div>
            <div class="instructions">
                🎯 Drag to aim or click SHOOT | 💪 Adjust power slider | 🎮 Move striker with buttons
            </div>
        </div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
