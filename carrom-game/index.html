<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carrom Game</title>
  <style>
    body { font-family: Arial, sans-serif; background: #ddd; text-align: center; }
    #menu { margin: 10px; }
    button { margin: 5px; padding: 10px 20px; }
    #settings { display: none; background: #fff; border: 1px solid #333; padding: 20px; margin: 20px auto; width: 300px; }
    canvas { background: #f5deb3; border: 10px solid #8b4513; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>Carrom Lite Clone</h1>
  <div id="menu">
    <button onclick="startGame()">Start</button>
    <button onclick="pauseGame()">Pause</button>
    <button onclick="resetGame()">Reset</button>
    <button onclick="toggleSettings()">Settings</button>
  </div>
  <div id="settings">
    <h3>Game Settings</h3>
    <label>Striker Power: <input type="range" id="power" min="1" max="10" value="5"></label><br>
    <label>Coin Speed: <input type="range" id="speed" min="1" max="10" value="5"></label><br>
    <button onclick="toggleSettings()">Close</button>
  </div>
  <canvas id="board" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    let running = false;

    function drawBoard() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#f5deb3";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      // pockets
      ctx.fillStyle = "black";
      [0, canvas.width].forEach(x => [0, canvas.height].forEach(y => {
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI*2);
        ctx.fill();
      }));
    }

    function startGame() { running = true; loop(); }
    function pauseGame() { running = false; }
    function resetGame() { drawBoard(); }
    function toggleSettings() {
      const s = document.getElementById("settings");
      s.style.display = s.style.display === "none" ? "block" : "none";
    }

    function loop() {
      if (!running) return;
      drawBoard();
      // TODO: add striker + coins + physics
      requestAnimationFrame(loop);
    }

    drawBoard();
  </script>
</body>
</html>
