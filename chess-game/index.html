<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play Chess online free! Realistic chess pieces, light green board, classic strategy game.">
    <meta name="keywords" content="chess, online chess, realistic chess, strategy game, board game">
    <title>Chess Game - Realistic Pieces | PlayCrazyGames</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9770610643444805" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-top, .ad-bottom {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.95);
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            border-radius: 12px;
        }

        .ad-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
        }

        .game-wrapper {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            background: white;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: #2e7d32;
            color: white;
            transform: translateX(-5px);
        }

        .game-container {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2rem;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ffcc80;
            font-size: 0.85rem;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            background: #ff9800;
            color: #1a237e;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .captured-pieces {
            display: flex;
            gap: 20px;
            color: #ffcc80;
            font-size: 0.85rem;
        }

        .captured-pieces span {
            color: white;
            font-weight: bold;
        }

        .chessboard-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #chessCanvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 10px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .back-btn {
            background: linear-gradient(135deg, #757575, #616161);
            color: white;
        }

        .controls button:hover {
            transform: scale(1.05);
        }

        .status {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffcc80;
            min-height: 40px;
        }

        .instructions {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .instruction {
            color: #ffcc80;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .game-container { padding: 15px; }
            .game-header h1 { font-size: 1.5rem; }
            .turn-indicator { font-size: 0.9rem; padding: 5px 15px; }
            .controls button { padding: 6px 15px; font-size: 0.8rem; }
            .instruction { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-wrapper">
        <a href="../index.html" class="back-home">← Back to Games Hub</a>
        
        <div class="game-container">
            <div class="game-header">
                <h1>♜ Realistic Chess</h1>
                <p class="subtitle">Classic Strategy Board Game</p>
            </div>
            
            <div class="game-info">
                <div class="turn-indicator" id="turnIndicator">
                    <span>⚪</span> White's Turn
                </div>
                <div class="captured-pieces">
                    <div>⚪ White Captured: <span id="whiteCaptured">0</span></div>
                    <div>⚫ Black Captured: <span id="blackCaptured">0</span></div>
                </div>
            </div>
            
            <div class="chessboard-container">
                <canvas id="chessCanvas" width="640" height="640"></canvas>
            </div>
            
            <div class="controls">
                <button id="resetBtn" class="reset-btn">🔄 New Game</button>
                <button id="backBtn" class="back-btn">🏠 Games Hub</button>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="instructions">
                <div class="instruction">👑 Click a piece, then click a highlighted square to move</div>
                <div class="instruction">⭐ Protect your king and checkmate to win!</div>
            </div>
        </div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
