<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Play Chess online free! Large realistic chess pieces, classic strategy game.">
    <title>Chess Game - Bigger Pieces | PlayCrazyGames</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-top, .ad-bottom {
            width: 100%;
            max-width: 850px;
            background: rgba(255,255,255,0.95);
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            border-radius: 12px;
        }

        .ad-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
        }

        .game-wrapper {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 25px;
            background: white;
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .back-home:hover {
            background: #2e7d32;
            color: white;
            transform: translateX(-5px);
        }

        .game-container {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 2.2rem;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ffcc80;
            font-size: 0.9rem;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .turn-indicator {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 30px;
            background: #ff9800;
            color: #1a237e;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .captured-pieces {
            display: flex;
            gap: 25px;
            color: #ffcc80;
            font-size: 0.9rem;
        }

        .captured-pieces span {
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .chessboard-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 85px);
            border: 3px solid #2e7d32;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .square {
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .square.light {
            background-color: #f0d9b5;
        }

        .square.dark {
            background-color: #b58863;
        }

        .square.selected {
            background-color: #7b9c6e;
            box-shadow: inset 0 0 0 3px gold;
            transform: scale(0.98);
        }

        .square.valid-move {
            position: relative;
            background-color: #90ee90;
        }

        .square.valid-move::after {
            content: '●';
            position: absolute;
            font-size: 2rem;
            color: rgba(0, 100, 0, 0.6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .square.check {
            background-color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { background-color: #ff6b6b; }
            50% { background-color: #ff4444; }
        }

        .square:hover {
            transform: scale(0.97);
            filter: brightness(0.95);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .back-btn {
            background: linear-gradient(135deg, #757575, #616161);
            color: white;
        }

        .controls button:hover {
            transform: scale(1.05);
        }

        .status {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffcc80;
            min-height: 45px;
            font-size: 1rem;
        }

        .instructions {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .instruction {
            color: #ffcc80;
            font-size: 0.85rem;
        }

        @media (max-width: 750px) {
            #chessboard {
                grid-template-columns: repeat(8, 55px);
            }
            .square {
                width: 55px;
                height: 55px;
                font-size: 2.2rem;
            }
            .square.valid-move::after {
                font-size: 1.2rem;
            }
            .game-header h1 { font-size: 1.5rem; }
            .turn-indicator { font-size: 1rem; padding: 6px 15px; }
            .controls button { padding: 8px 18px; font-size: 0.85rem; }
            .instruction { font-size: 0.7rem; }
        }

        @media (max-width: 500px) {
            #chessboard {
                grid-template-columns: repeat(8, 42px);
            }
            .square {
                width: 42px;
                height: 42px;
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-wrapper">
        <a href="../index.html" class="back-home">← Back to Games Hub</a>
        
        <div class="game-container">
            <div class="game-header">
                <h1>♜ Classic Chess</h1>
                <p class="subtitle">Bigger Pieces | Strategy Board Game</p>
            </div>
            
            <div class="game-info">
                <div class="turn-indicator" id="turnIndicator">
                    <span>⚪</span> White's Turn
                </div>
                <div class="captured-pieces">
                    <div>⚪ White: <span id="whiteCaptured">0</span> pieces</div>
                    <div>⚫ Black: <span id="blackCaptured">0</span> pieces</div>
                </div>
            </div>
            
            <div class="chessboard-container">
                <div id="chessboard"></div>
            </div>
            
            <div class="controls">
                <button id="resetBtn" class="reset-btn">🔄 New Game</button>
                <button id="backBtn" class="back-btn">🏠 Games Hub</button>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="instructions">
                <div class="instruction">👑 Click a piece → Click highlighted square to move</div>
                <div class="instruction">⭐ Protect your king | Checkmate to win!</div>
            </div>
        </div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
