<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Game</title>

<link rel="stylesheet" href="./style.css">

<!-- FIX: use reliable CDN -->
<script src="https://unpkg.com/chess.js@1.0.0-beta.6/dist/chess.min.js"></script>

</head>

<body>

<h1>♜ Chess Game ♞</h1>

<div class="controls">

<h3 id="turn">Loading...</h3>

<div id="board" class="board"></div>

<p id="status"></p>

<script src="./script.js"></script>

</body>
</html>
