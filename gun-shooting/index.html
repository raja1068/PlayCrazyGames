<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gun Shooting Game with 10 exciting levels! Shoot targets, increase difficulty, become a sharpshooter!">
    <meta name="keywords" content="shooting game, gun game, target shooting, 10 levels, action game">
    <title>Gun Shooting Game - 10 Levels | PlayCrazyGames</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9770610643444805" crossorigin="anonymous"></script>
</head>
<body>
    <div class="ad-top">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-container">
        <a href="../index.html" class="back-home">← Back to All Games</a>
        <h1>🔫 Gun Shooting Game</h1>
        <div class="game-stats">
            <div>Level: <span id="level">1</span>/10</div>
            <div>Score: <span id="score">0</span></div>
            <div>Shots Left: <span id="shotsLeft">10</span></div>
            <div>Targets Hit: <span id="targetsHit">0</span>/<span id="targetsNeeded">5</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls">
            <button id="resetBtn">🔄 Restart Game</button>
            <button id="backBtn">🏠 Games Hub</button>
        </div>
        <div class="instructions">
            🎯 Click on targets to shoot them!<br>
            ⭐ Hit required targets to advance levels<br>
            🔫 Each level gets harder with faster targets<br>
            💥 Complete all 10 levels to win!
        </div>
        <div class="level-message" id="levelMessage"></div>
    </div>

    <div class="ad-bottom">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9770610643444805" data-ad-slot="4587389292" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script src="script.js"></script>
</body>
</html>
